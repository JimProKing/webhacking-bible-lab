{% extends "base.html" %}

{% block content %}
<h2>글쓰기</h2>
<p>새 게시글을 작성합니다.</p>

<form method="post">
    <div class="mb-3">
        <label class="form-label">제목</label>
        <input type="text" name="title" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">내용</label>
        <textarea name="content" class="form-control" rows="6" required></textarea>
    </div>
    <button type="submit" class="btn btn-success">등록</button>
</form>

<div class="alert alert-light small mt-3">
    <strong>학습 포인트:</strong> 이 페이지 자체는 크게 취약하지 않지만, 작성한 글이 <a href="/board">게시판 검색</a>이나 <a href="/search">고급 검색</a>에 노출되면서 SQLi의 대상이 됩니다.<br>
    나중에 댓글과 함께 Stored XSS를 테스트할 때도 이 글쓰기 기능을 사용할 수 있습니다.
</div>
{% endblock %}
